spike3:
  name: Publicly Verifiable Ed25519 Receipts
  status: PROVEN
  date_completed: 2026-06-14

  local_validation:
    harness:
      passed: 33
      total: 33
      status: PASS

    audit:
      passed: 6
      total: 6
      status: PASS

  live_validation:
    cloud_run_deployed: true
    secret_manager_private_key: configured
    active_key_id: tc-prod-2026-06-01

    well_known_key_endpoint:
      status: PASS
      endpoint: https://trustcheck-nandahack-293749289787.northamerica-northeast1.run.app/.well-known/trustcheck-key.json
      issuer_matches_public_base: true
      signature_algorithm: Ed25519
      canonicalization_version: tc-canon-1
      private_key_exposed: false

    alpha:
      target_id: target-alpha
      verdict: PASS
      action: DELEGATE
      receipt_issued: true
      independent_verification: PASS
      tampered_receipt_rejected: PASS

    beta:
      target_id: target-beta
      verdict: FAIL
      action: DO_NOT_DELEGATE
      receipt_issued: true
      independent_verification: PASS
      tampered_receipt_rejected: PASS

  cryptography:
    algorithm: Ed25519
    library: cryptography
    version_tested: 46.0.6
    canonicalization: tc-canon-1
    public_key_format: JWK OKP Ed25519
    verification_requires_server_secret: false

  proven:
    - deterministic canonicalization
    - public key discovery
    - independent receipt verification
    - signed verdict integrity
    - signed target integrity
    - signed evidence-root integrity
    - signed validity-window integrity
    - wrong-key rejection
    - unknown-key rejection
    - previous-key verification after rotation
    - revoked-key rejection
    - private-key non-exposure
    - alpha PASS to DELEGATE
    - beta FAIL to DO_NOT_DELEGATE

  limitations:
    - issuer authenticity depends on TLS and trust in the well-known endpoint
    - a compromised issuer with private-key access could forge receipts
    - revocation is asserted by the issuer and not backed by a transparency log
    - storage remains in memory
    - production key rotation has been designed and locally tested but not yet exercised live
    - autonomous agent verification must still be rerun across the three model configurations

  next_gate:
    name: Multi-model live Ed25519 verification
    required_runs: 6
    scenarios:
      - target-alpha
      - target-beta
    models:
      - gemini-2.5-flash
      - gemini-2.5-flash-lite
      - gemini-2.5-pro

hackathon_state_delta:
  phase: DESIGN/Spike3
  change:
    spike3_status: PROVEN
    live_cloud_run_validation: PASS
    independent_verification: PASS
    alpha_tamper_control: PASS
    beta_tamper_control: PASS
  next_action: Update the evaluation runner to require independent Ed25519 verification and rerun six live multi-model evaluations.
